<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — AjiraTalk</title>

  <!-- Lottie Web -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #080b12;
      --panel-l:   #0d1220;
      --panel-r:   #0a0d18;
      --gold:      #c9993a;
      --gold-lite: #e8b84b;
      --gold-dim:  rgba(201, 153, 58, 0.18);
      --text:      #eee8d8;
      --muted:     #6e7a94;
      --border:    rgba(201, 153, 58, 0.22);
      --input-bg:  rgba(255,255,255,0.04);
      --input-focus: rgba(201, 153, 58, 0.12);
      --error:     #e05c5c;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Layout ─────────────────────────────────────────── */
    .shell {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ─── LEFT PANEL ─────────────────────────────────────── */
    .panel-left {
      flex: 1 1 52%;
      background: var(--panel-l);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 60px 64px;
    }

    /* subtle grid texture */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,153,58,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,153,58,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    /* radial glow */
    .panel-left::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(201,153,58,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      position: absolute;
      top: 44px;
      left: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2;
      animation: fadeDown 0.6s ease both;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--gold);
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .left-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 440px;
    }

    .lottie-wrap {
      width: 340px;
      height: 145px;
      margin: 0 auto 48px;
      animation: fadeUp 0.8s ease 0.2s both;
      /* soft drop shadow so it pops on dark bg */
      filter: drop-shadow(0 8px 32px rgba(201,153,58,0.18));
    }

    #lottie-anim {
      width: 100%;
      height: 100%;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--text);
      animation: fadeUp 0.8s ease 0.35s both;
    }

    .tagline em {
      font-style: normal;
      color: var(--gold-lite);
    }

    .sub {
      margin-top: 18px;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
      max-width: 340px;
      margin-inline: auto;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 44px;
      animation: fadeUp 0.8s ease 0.65s both;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
    }

    .dot.active {
      background: var(--gold);
      width: 22px;
      border-radius: 4px;
    }

    /* ─── RIGHT PANEL ─────────────────────────────────────── */
    .panel-right {
      flex: 0 0 440px;
      background: var(--panel-r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 52px;
      border-left: 1px solid var(--border);
      position: relative;
    }

    .panel-right::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
    }

    .form-box {
      width: 100%;
      max-width: 340px;
      animation: fadeUp 0.8s ease 0.15s both;
    }

    .form-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .form-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 40px;
      font-weight: 300;
    }

    .form-sub a {
      color: var(--gold-lite);
      text-decoration: none;
      font-weight: 500;
    }

    .form-sub a:hover {
      text-decoration: underline;
    }

    /* Field */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    .field input {
      width: 100%;
      height: 50px;
      padding: 0 44px 0 44px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    .field input::placeholder {
      color: #3a4255;
    }

    .field input:focus {
      border-color: var(--gold);
      background: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(201,153,58,0.10);
    }

    .field input:focus + .input-wrap svg,
    .input-wrap:focus-within svg {
      stroke: var(--gold);
    }

    /* password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: var(--gold); }
    .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* helpers row */
    .helpers {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      margin-top: -4px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--input-bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .remember input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }

    .remember input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 2px;
      width: 6px;
      height: 8px;
      border: 2px solid #080b12;
      border-top: none;
      border-left: none;
      transform: rotate(42deg);
    }

    .remember span {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .forgot {
      font-size: 0.82rem;
      color: var(--gold-lite);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .forgot:hover { opacity: 0.75; }

    /* CTA Button */
    .btn-login {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #c9993a 0%, #e8b84b 60%, #c9993a 100%);
      background-size: 200% 100%;
      background-position: 100% 0;
      color: #080b12;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background-position 0.4s ease, box-shadow 0.3s, transform 0.15s;
      margin-bottom: 28px;
    }

    .btn-login:hover {
      background-position: 0 0;
      box-shadow: 0 6px 28px rgba(201,153,58,0.38);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.loading {
      pointer-events: none;
    }

    .btn-login .btn-text { transition: opacity 0.2s; }
    .btn-login .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(8,11,18,0.3);
      border-top-color: #080b12;
      border-radius: 50%;
      opacity: 0;
      animation: spin 0.7s linear infinite;
      transition: opacity 0.2s;
    }

    .btn-login.loading .btn-text { opacity: 0; }
    .btn-login.loading .spinner { opacity: 1; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Social Buttons */
    .socials {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      height: 46px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--input-bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.25s, background 0.25s;
    }

    .btn-social:hover {
      border-color: rgba(201,153,58,0.45);
      background: var(--gold-dim);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ─── Animations ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: translate(-50%,-50%) rotate(360deg); }
    }

    /* ─── Responsive ──────────────────────────────────────── */
    @media (max-width: 900px) {
      .shell { flex-direction: column; overflow: auto; }
      html, body { overflow: auto; }

      .panel-left {
        flex: none;
        padding: 48px 32px 52px;
        min-height: 46vh;
      }

      .brand { top: 28px; left: 28px; }

      .lottie-wrap { width: 400px; height: 400px; }

      .tagline { font-size: 1.4rem; position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; }

      .panel-right {
        flex: none;
        border-left: none;
        border-top: 1px solid var(--border);
        padding: 48px 28px 56px;
      }
    }

    @media (max-width: 480px) {
      .panel-left { padding: 48px 20px 44px; }
      .panel-right { padding: 40px 20px 48px; }
      .socials { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ════════ LEFT ════════ -->
  <div class="panel-left">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 16 16"><path d="M2 3h12v7a2 2 0 01-2 2H4a2 2 0 01-2-2V3zm4 9v2m4-2v2M5 14h6"/></svg>
      </div>
      <span class="brand-name">AjiraTalk</span>
    </div>

    <div class="left-content">
      <div class="lottie-wrap">
        <div id="lottie-anim"></div>
      </div>

      <h2 class="tagline">
        Where employees<br><em>speak</em> &amp; thrive
      </h2>

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- ════════ RIGHT ════════ -->
  <div class="panel-right">
    <div class="form-box">

      <h1 class="form-heading">Welcome back</h1>
      <p class="form-sub">New here? <a href="register.html">Create an account</a></p>

      <div class="field">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          <input
            type="email"
            id="email"
            autocomplete="email"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input
            type="password"
            id="password"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button class="toggle-pw" type="button" aria-label="Show password" id="togglePw">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="helpers">
        <label class="remember">
          <input type="checkbox" id="remember" />
          <span>Remember me</span>
        </label>
        <a class="forgot" href="#">Forgot password?</a>
      </div>

      <button class="btn-login" id="loginBtn" type="button">
        <span class="btn-text">Sign in</span>
        <span class="spinner"></span>
      </button>

      <div class="divider"><span>or continue with</span></div>

      <div class="socials">
        <button class="btn-social" type="button" id="googleLoginBtn">
          <!-- Google -->
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <button class="btn-social" type="button" id="microsoftLoginBtn">
          <!-- Microsoft -->
          <svg viewBox="0 0 24 24">
            <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
            <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
            <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
            <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
          </svg>
          Microsoft
        </button>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Lottie animation ─────────────────────────────────────
  lottie.loadAnimation({
    container: document.getElementById('lottie-anim'),
    renderer: 'svg',
    loop: true,
    autoplay: true,
    path: '/json/Sign up.json'   // correct path for login animation
  });

  // ── Password toggle ───────────────────────────────────────
  const pwInput  = document.getElementById('password');
  const togglePw = document.getElementById('togglePw');
  const eyeIcon  = document.getElementById('eyeIcon');

  const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  togglePw.addEventListener('click', () => {
    const isText = pwInput.type === 'text';
    pwInput.type = isText ? 'password' : 'text';
    eyeIcon.innerHTML = isText ? eyeOpen : eyeClosed;
    togglePw.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
  });

  // ── OAuth Login Handlers ───────────────────────────────────
  const googleLoginBtn = document.getElementById('googleLoginBtn');
  const microsoftLoginBtn = document.getElementById('microsoftLoginBtn');

  // Google OAuth Login
  googleLoginBtn.addEventListener('click', async () => {
    try {
      // Show loading state
      googleLoginBtn.disabled = true;
      googleLoginBtn.innerHTML = '<span style="display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-radius: 50%; border-top-color: #667eea; animation: spin 0.8s linear infinite;"></span>';
      
      // Initiate Google OAuth flow
      const googleClientId = 'your-google-client-id.apps.googleusercontent.com'; // Replace with actual client ID
      const redirectUri = encodeURIComponent(window.location.origin + '/auth/google/callback');
      const scope = encodeURIComponent('openid email profile');
      
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${googleClientId}&` +
        `redirect_uri=${redirectUri}&` +
        `response_type=code&` +
        `scope=${scope}&` +
        `access_type=offline&` +
        `prompt=consent`;
      
      window.location.href = authUrl;
      
    } catch (error) {
      console.error('Google login error:', error);
      googleLoginBtn.disabled = false;
      googleLoginBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none">...</svg>Google';
      alert('Google login failed. Please try again.');
    }
  });

  // Microsoft OAuth Login
  microsoftLoginBtn.addEventListener('click', async () => {
    try {
      // Show loading state
      microsoftLoginBtn.disabled = true;
      microsoftLoginBtn.innerHTML = '<span style="display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-radius: 50%; border-top-color: #667eea; animation: spin 0.8s linear infinite;"></span>';
      
      // Initiate Microsoft OAuth flow
      const microsoftClientId = 'your-microsoft-client-id'; // Replace with actual client ID
      const redirectUri = encodeURIComponent(window.location.origin + '/auth/microsoft/callback');
      const scope = encodeURIComponent('openid email profile');
      
      const authUrl = `https://login.microsoftonline.com/common/oauth2/v2.0/authorize?` +
        `client_id=${microsoftClientId}&` +
        `redirect_uri=${redirectUri}&` +
        `response_type=code&` +
        `scope=${scope}&` +
        `response_mode=query`;
      
      window.location.href = authUrl;
      
    } catch (error) {
      console.error('Microsoft login error:', error);
      microsoftLoginBtn.disabled = false;
      microsoftLoginBtn.innerHTML = '<svg viewBox="0 0 24 24">...</svg>Microsoft';
      alert('Microsoft login failed. Please try again.');
    }
  });

  // ── Login button (demo loading state) ────────────────────
  const loginBtn = document.getElementById('loginBtn');
  loginBtn.addEventListener('click', () => {
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value;
    if (!email || !pw) {
      shake(loginBtn);
      return;
    }
    loginBtn.classList.add('loading');
    // Replace this timeout with your actual fetch/auth call
    setTimeout(() => {
      loginBtn.classList.remove('loading');
      // e.g. window.location.href = 'dashboard.html';
    }, 2000);
  });

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'shake 0.4s ease';
  }

  // shake keyframes injected via JS
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
