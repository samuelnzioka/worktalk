<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Log In - WorkTalk</title>
    
    <style>
        /* ==================== RESET & BASE ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a1a2e;
        }

        /* ==================== HEADER ==================== */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            color: #1a1a2e;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        .nav {
            display: flex;
            gap: 32px;
        }

        .nav-link {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: #667eea;
        }

        .user-menu {
            display: flex;
            gap: 12px;
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: #4a5568;
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }

        /* ==================== AUTH CONTAINER ==================== */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* ==================== ANIMATION CONTAINER ==================== */
        .animation-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .animation-container svg {
            width: 100%;
            height: 100%;
        }

        /* ==================== AUTH HEADER ==================== */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-header p {
            color: #718096;
            font-size: 14px;
        }

        /* ==================== FORM ==================== */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-error {
            color: #e53e3e;
            font-size: 12px;
            margin-top: 4px;
        }

        .form-hint {
            color: #718096;
            font-size: 12px;
            margin-top: 4px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #4a5568;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #4a5568;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .employee-note {
            margin-top: 12px;
            font-size: 12px;
            color: #718096;
        }

        /* ==================== FOOTER ==================== */
        .footer {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: #718096;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 640px) {
            .auth-card {
                padding: 24px;
            }
            
            .header-content {
                padding: 0 16px;
            }
            
            .nav {
                gap: 16px;
            }
            
            .nav-link {
                font-size: 14px;
            }
            
            .animation-container {
                width: 150px;
                height: 150px;
            }
        }

        @media (max-width: 480px) {
            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
    
    <!-- Lottie Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <a href="/" class="logo">Work<span>Talk</span></a>
                <nav class="nav">
                    <a href="/companies.html" class="nav-link">Companies</a>
                    <a href="/public-timeline.html" class="nav-link">Public Timeline</a>
                </nav>
                <div class="user-menu">
                    <a href="/login.html" class="btn btn-primary">Log In</a>
                    <a href="/register.html" class="btn btn-outline">Sign Up</a>
                </div>
            </div>
        </header>

        <main class="auth-container">
            <div class="auth-card">
                <!-- Lottie Animation Container -->
                <div id="loginAnimation" class="animation-container"></div>
                
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Log in to your WorkTalk account</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="you@example.com" required>
                        <div class="form-error" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input" 
                               placeholder="••••••••" required>
                        <div class="form-error" id="passwordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                        Log In
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/register.html">Sign up</a></p>
                    <p class="employee-note">Employee? <a href="/invite-accept.html">Accept an invite</a></p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 WorkTalk. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Initialize Lottie Animation for Login Page
        document.addEventListener('DOMContentLoaded', function() {
            const animationContainer = document.getElementById('loginAnimation');
            
            if (animationContainer) {
                try {
                    var loginAnimation = lottie.loadAnimation({
                        container: animationContainer,
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        path: '/json/Sample Animation.json',
                        rendererSettings: {
                            preserveAspectRatio: 'xMidYMid meet'
                        }
                    });
                    
                    // Optional: Handle animation load errors
                    loginAnimation.addEventListener('error', function(e) {
                        console.error('Animation load error:', e);
                        animationContainer.innerHTML = '<div style="text-align: center; font-size: 14px; color: #999;">🎬 Animation</div>';
                    });
                    
                } catch (error) {
                    console.error('Lottie error:', error);
                    animationContainer.innerHTML = '<div style="text-align: center; font-size: 14px; color: #999;">🎬 Animation</div>';
                }
            }
        });

        // Form submission handler
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMe = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            document.getElementById('emailError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            let hasError = false;
            if (!email) {
                document.getElementById('emailError').textContent = 'Email is required';
                hasError = true;
            }
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password is required';
                hasError = true;
            }
            
            if (hasError) return;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            // Simulate login (replace with actual API call)
            setTimeout(() => {
                alert(`Demo Login\n\nEmail: ${email}\nPassword: ${password}\nRemember me: ${rememberMe.checked}\n\n(Replace with actual API call)`);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
            }, 1000);
        });
    </script>
</body>
</html>
