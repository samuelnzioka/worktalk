<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — AjiraTalk</title>

  <!-- Lottie Web -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #6c757d;
      --panel-l:   #5a6268;
      --panel-r:   #7d8690;
      --gold:      #c9993a;
      --gold-lite: #e8b84b;
      --gold-dim:  rgba(201, 153, 58, 0.18);
      --text:      #ffffff;
      --muted:     #d1d5db;
      --border:    rgba(201, 153, 58, 0.22);
      --input-bg:  rgba(255,255,255,0.9);
      --input-focus: rgba(201, 153, 58, 0.12);
      --success:   #4caf7d;
      --error:     #e05c5c;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ─── Brand (inside left panel) ──────────────────────── */
    .brand {
      position: absolute;
      top: 44px;
      left: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2;
      animation: fadeDown 0.6s ease both;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--gold);
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    /* ─── Layout ─────────────────────────────────────────── */
    .shell {
      display: flex;
      min-height: 100vh;
      width: 100vw;
    }

    /* ─── LEFT — Animation Panel ──────────────────────────── */
    .panel-left {
      flex: 1 1 52%;
      background: var(--panel-l);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* grid texture */
    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,153,58,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,153,58,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    /* radial glow */
    .panel-left::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(201,153,58,0.09) 0%, transparent 68%);
      pointer-events: none;
    }

    .left-content {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .form-box {
      width: 100%;
      max-width: 356px;
      animation: fadeUp 0.8s ease 0.1s both;
    }

    .form-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 5px;
    }

    .form-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 32px;
      font-weight: 300;
    }

    .form-sub a {
      color: var(--gold-lite);
      text-decoration: none;
      font-weight: 500;
    }

    .form-sub a:hover { text-decoration: underline; }

    /* Two-column row */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Field */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap > svg.ico {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    .field input {
      width: 100%;
      height: 48px;
      padding: 0 40px 0 40px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    .field input::placeholder { color: #2f3a50; }

    .field input:focus {
      border-color: var(--gold);
      background: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(201,153,58,0.10);
    }

    .input-wrap:focus-within > svg.ico { stroke: var(--gold); }

    /* Password strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 7px;
    }

    .strength-bar span {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s;
    }

    .strength-bar[data-level="1"] span:nth-child(1) { background: var(--error); }
    .strength-bar[data-level="2"] span:nth-child(1),
    .strength-bar[data-level="2"] span:nth-child(2) { background: #e8a23a; }
    .strength-bar[data-level="3"] span:nth-child(1),
    .strength-bar[data-level="3"] span:nth-child(2),
    .strength-bar[data-level="3"] span:nth-child(3) { background: var(--gold-lite); }
    .strength-bar[data-level="4"] span { background: var(--success); }

    .strength-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* password toggle */
    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: var(--gold); }
    .toggle-pw svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* Match indicator */
    .match-hint {
      font-size: 0.72rem;
      margin-top: 5px;
      height: 14px;
      transition: color 0.2s;
    }

    /* Terms */
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 22px;
      margin-top: 4px;
    }

    .terms input[type="checkbox"] {
      appearance: none;
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      margin-top: 2px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--input-bg);
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .terms input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }

    .terms input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 7px;
      height: 9px;
      border: 2px solid #080b12;
      border-top: none;
      border-left: none;
      transform: rotate(42deg);
    }

    .terms p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .terms a { color: var(--gold-lite); text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    /* CTA */
    .btn-signup {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #c9993a 0%, #e8b84b 60%, #c9993a 100%);
      background-size: 200% 100%;
      background-position: 100% 0;
      color: #080b12;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background-position 0.4s ease, box-shadow 0.3s, transform 0.15s;
      margin-bottom: 24px;
    }

    .btn-signup:hover {
      background-position: 0 0;
      box-shadow: 0 6px 28px rgba(201,153,58,0.38);
      transform: translateY(-1px);
    }

    .btn-signup:active { transform: translateY(0); }
    .btn-signup.loading { pointer-events: none; }
    .btn-signup .btn-text { transition: opacity 0.2s; }
    .btn-signup .spinner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 20px; height: 20px;
      border: 2.5px solid rgba(8,11,18,0.3);
      border-top-color: #080b12;
      border-radius: 50%; opacity: 0;
      animation: spin 0.7s linear infinite;
      transition: opacity 0.2s;
    }
    .btn-signup.loading .btn-text { opacity: 0; }
    .btn-signup.loading .spinner { opacity: 1; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .divider span { font-size: 0.74rem; color: var(--muted); letter-spacing: 0.05em; }

    /* Social */
    .socials { display: flex; gap: 12px; }
    .btn-social {
      flex: 1; height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--input-bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: border-color 0.25s, background 0.25s;
    }
    .btn-social:hover { border-color: rgba(201,153,58,0.45); background: var(--gold-dim); }
    .btn-social svg { width: 17px; height: 17px; flex-shrink: 0; }

    /* ─── RIGHT — Form Panel ──────────────────────────────── */
    .panel-right {
      flex: 0 0 460px;
      background: var(--panel-r);
      display: flex;
      flex-direction: column;
      padding: 52px 52px;
      border-left: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .panel-right::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      opacity: 0.35;
    }

    /* Lottie loader overlay */
    .lottie-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: fadeUp 0.9s ease 0.3s both;
      filter: drop-shadow(0 8px 32px rgba(201,153,58,0.18));
    }

    .lottie-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s;
    }

    .lottie-loader.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 42px;
      height: 42px;
      border: 2.5px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loader-text {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    #lottie-anim {
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.5s ease;
      background: transparent;
    }

    #lottie-anim.visible { opacity: 1; }

    /* ─── Floating Bubbles ────────────────────────────────── */
    .bubbles-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      padding: 8px 18px;
      border-radius: 24px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(201,153,58,0.25);
      animation: floatBubble 6s ease-in-out infinite;
      opacity: 0;
    }

    .bubble.visible { opacity: 1; }

    .bubble:nth-child(1) {
      top: 12%; left: 8%;
      background: rgba(201,153,58,0.12);
      color: var(--gold-lite);
      animation-delay: 0s;
      animation-duration: 7s;
    }
    .bubble:nth-child(2) {
      top: 28%; right: 10%;
      background: rgba(76,175,125,0.10);
      color: #7dd4a0;
      border-color: rgba(76,175,125,0.25);
      animation-delay: 1.2s;
      animation-duration: 8s;
    }
    .bubble:nth-child(3) {
      top: 50%; left: 5%;
      background: rgba(232,162,58,0.10);
      color: #e8b84b;
      border-color: rgba(232,162,58,0.25);
      animation-delay: 2.4s;
      animation-duration: 6.5s;
    }

    @keyframes floatBubble {
      0%, 100% { transform: translateY(0) translateX(0); }
      25%      { transform: translateY(-14px) translateX(8px); }
      50%      { transform: translateY(-6px) translateX(-6px); }
      75%      { transform: translateY(-18px) translateX(4px); }
    }

    .tagline {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.35;
      letter-spacing: 0.01em;
      color: var(--text);
      z-index: 4;
      animation: fadeUp 0.9s ease 0.45s both;
    }

    .tagline em { font-style: normal; color: var(--gold-lite); }

    .sub {
      margin-top: 16px;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.65;
      animation: fadeUp 0.9s ease 0.6s both;
    }

    .back-home {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      animation: fadeUp 0.9s ease 0.75s both;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.8;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      opacity: 1;
      color: var(--gold-lite);
    }

    /* Feature pills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 28px;
      animation: fadeUp 0.9s ease 0.75s both;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(201,153,58,0.08);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .pill svg {
      width: 12px;
      height: 12px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ─── Animations ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }

    /* ─── Responsive ──────────────────────────────────────── */
    @media (max-width: 960px) {
      .shell { flex-direction: column; }

      .panel-left {
        flex: none;
        padding: 48px 24px 40px;
        min-height: 50vh;
      }

      .panel-right {
        flex: none;
        border-left: none;
        border-top: 1px solid var(--border);
        padding: 48px 28px 56px;
      }

      .lottie-wrap { max-width: 300px; }
    }

    @media (max-width: 480px) {
      .row-2 { grid-template-columns: 1fr; }
      .socials { flex-direction: column; }
      .panel-right { padding: 40px 20px 48px; }
      .brand { top: 28px; left: 28px; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ════════ LEFT — Animation ════════ -->
  <div class="panel-left">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 16 16"><path d="M2 3h12v7a2 2 0 01-2 2H4a2 2 0 01-2-2V3zm4 9v2m4-2v2M5 14h6"/></svg>
      </div>
      <span class="brand-name">AjiraTalk</span>
    </div>

    <div class="left-content">

      <div class="lottie-wrap">
        <div id="lottie-anim"></div>
        <div class="bubbles-layer">
          <span class="bubble">Name</span>
          <span class="bubble">Email</span>
          <span class="bubble">Password</span>
        </div>
      </div>

      <h2 class="tagline">
        Where employees<br><em>speak &</em> thrive
      </h2>

      <div class="back-home">
        <a href="landing.html" class="back-link">← Back to Home</a>
      </div>

    </div>
  </div><!-- /panel-left -->

  <!-- ════════ RIGHT — Form ════════ -->
  <div class="panel-right">

    <div class="form-box">

      <h1 class="form-heading">Create account</h1>
      <p class="form-sub">Already have one? <a href="login.html">Sign in</a></p>

      <form id="registerForm" onsubmit="return false;">
        <!-- Name row -->
        <div class="row-2">
          <div class="field">
            <label for="fname">First name</label>
            <div class="input-wrap">
              <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="fname" autocomplete="given-name" placeholder="Jane" />
            </div>
          </div>
          <div class="field">
            <label for="lname">Last name</label>
            <div class="input-wrap">
              <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="lname" autocomplete="family-name" placeholder="Doe" />
            </div>
          </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Work email</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          <input type="email" id="email" autocomplete="email" placeholder="you@company.com" />
        </div>
      </div>

      <!-- Username -->
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" autocomplete="username" placeholder="johndoe" />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="password" autocomplete="new-password" placeholder="Min. 8 characters" />
          <button class="toggle-pw" type="button" id="togglePw1" aria-label="Show password">
            <svg id="eye1" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar" id="strengthBar" data-level="0">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <!-- Confirm password -->
      <div class="field">
        <label for="confirm">Confirm password</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="confirm" autocomplete="new-password" placeholder="Repeat password" />
          <button class="toggle-pw" type="button" id="togglePw2" aria-label="Show password">
            <svg id="eye2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
      </div>

      <!-- Terms -->
      <div class="terms">
        <input type="checkbox" id="terms" />
        <p>I agree to AjiraTalk's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
      </div>

      <!-- Sign up CTA -->
      <button class="btn-signup" id="signupBtn" type="submit">
        <span class="btn-text">Create my account</span>
        <span class="spinner"></span>
      </button>

      </form>

      <div class="divider"><span>or sign up with</span></div>

      <div class="socials">
        <button class="btn-social" type="button">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <button class="btn-social" type="button">
          <svg viewBox="0 0 24 24">
            <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
            <rect x="13" y="1"  width="10" height="10" fill="#7FBA00"/>
            <rect x="1"  y="13" width="10" height="10" fill="#00A4EF"/>
            <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
          </svg>
          Microsoft
        </button>
      </div>

    </div>
  </div><!-- /panel-right -->

</div><!-- /shell -->

<script>
  /* ── Lottie — Canvas renderer for blend mode support ─── */
  const anim = lottie.loadAnimation({
    container:  document.getElementById('lottie-anim'),
    renderer:   'canvas',        // ← canvas handles bm:3 (Multiply) & bm:5 (Screen) correctly
    loop:       false,
    autoplay:   false,
    path:       'json/computer_use_animation.json'
  });

  const animEl  = document.getElementById('lottie-anim');
  let   isIdle  = true;   // track which segment is playing

  // Marker segments
  const IDLE = { name: 'idle',  start: 0,  end: 27  };
  const FLIP = { name: 'Flip',  start: 28, end: 95  };

  function playIdle() {
    isIdle = true;
    anim.playSegments([IDLE.start, IDLE.end], true);
    anim.loop = true;
  }

  function playFlip(thenIdle = true) {
    isIdle = false;
    anim.loop = false;
    anim.playSegments([FLIP.start, FLIP.end], true);
    if (thenIdle) {
      anim.addEventListener('complete', function onFlipDone() {
        anim.removeEventListener('complete', onFlipDone);
        playIdle();
      });
    }
  }

  anim.addEventListener('data_ready', () => {
    animEl.classList.add('visible');
    playIdle();
    // Show floating bubbles after animation loads
    document.querySelectorAll('.bubble').forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), 300 + i * 200);
    });
  });

  /* ── Password visibility toggles ─────────────────────── */
  const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  function makeToggle(btnId, inputId, eyeId) {
    const btn   = document.getElementById(btnId);
    const input = document.getElementById(inputId);
    const eye   = document.getElementById(eyeId);
    btn.addEventListener('click', () => {
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      eye.innerHTML = show ? eyeClosed : eyeOpen;
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });
  }

  makeToggle('togglePw1', 'password', 'eye1');
  makeToggle('togglePw2', 'confirm',  'eye2');

  /* ── Password strength meter ──────────────────────────── */
  const pwInput      = document.getElementById('password');
  const strengthBar  = document.getElementById('strengthBar');
  const strengthLbl  = document.getElementById('strengthLabel');
  const labels       = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const labelColors  = ['', '#e05c5c', '#e8a23a', '#e8b84b', '#4caf7d'];

  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 8)            score++;
    if (/[A-Z]/.test(v))         score++;
    if (/[0-9]/.test(v))         score++;
    if (/[^A-Za-z0-9]/.test(v))  score++;
    strengthBar.dataset.level  = v.length ? score : 0;
    strengthLbl.textContent    = v.length ? labels[score] : '';
    strengthLbl.style.color    = labelColors[score];
    checkMatch();
  });

  /* ── Password match hint ──────────────────────────────── */
  const confirmInput = document.getElementById('confirm');
  const matchHint    = document.getElementById('matchHint');

  function checkMatch() {
    const pw = pwInput.value;
    const cf = confirmInput.value;
    if (!cf) { matchHint.textContent = ''; return; }
    if (pw === cf) {
      matchHint.textContent = '✓ Passwords match';
      matchHint.style.color = '#4caf7d';
    } else {
      matchHint.textContent = '✗ Passwords do not match';
      matchHint.style.color = '#e05c5c';
    }
  }

  confirmInput.addEventListener('input', checkMatch);

  /* ── Sign up form ───────────────────────────────────── */
  const registerForm = document.getElementById('registerForm');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();  // ✅ THIS PREVENTS PAGE RELOAD
    
    const fname   = document.getElementById('fname').value.trim();
    const lname   = document.getElementById('lname').value.trim();
    const email   = document.getElementById('email').value.trim();
    const username = document.getElementById('username').value.trim();
    const pw      = pwInput.value;
    const cf      = confirmInput.value;
    const agreed  = document.getElementById('terms').checked;

    if (!fname || !lname || !email || !username || !pw || !cf) {
      shake(document.getElementById('signupBtn')); return;
    }
    
    // Username validation: 3-20 chars, letters/numbers/_- only
    if (username.length < 3 || username.length > 20 || !/^[a-zA-Z0-9_-]+$/.test(username)) {
      alert('Username must be 3-20 characters and contain only letters, numbers, underscores, and hyphens.');
      shake(document.getElementById('signupBtn')); return;
    }
    
    // Name validation: at least 2 characters, letters/spaces only
    const fullName = `${fname} ${lname}`;
    if (fullName.length < 2 || !/^[a-zA-Z\s]+$/.test(fullName)) {
      alert('Name must be at least 2 characters and contain only letters and spaces.');
      shake(document.getElementById('signupBtn')); return;
    }
    
    // Password validation: at least 8 chars with letter AND number
    if (pw.length < 8 || !/[a-zA-Z]/.test(pw) || !/[0-9]/.test(pw)) {
      alert('Password must be at least 8 characters and contain both letters and numbers.');
      shake(document.getElementById('signupBtn')); return;
    }
    
    if (pw !== cf) {
      shake(document.getElementById('signupBtn'));
      confirmInput.focus(); return;
    }
    if (!agreed) {
      shake(document.getElementById('signupBtn')); return;
    }

    // Trigger the fun Flip animation on submit
    playFlip(true);

    document.getElementById('signupBtn').classList.add('loading');
    try {
      // Call your registration API with exact format your backend expects
      const response = await fetch('https://worktalk-backend2.onrender.com/api/auth/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: `${fname} ${lname}`,    // Must be at least 2 characters, letters/spaces only
          email: email,                 // Valid email format
          username: username,           // 3-20 chars, letters/numbers/_- only
          password: pw                  // At least 8 chars with letter AND number
        })
      });
      
      if (response.ok) {
        const data = await response.json();
        
        // Store tokens and user data
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        // Redirect to main platform
        window.location.replace('/platform.html');
      } else {
        // Handle different HTTP status codes
        let errorMessage = 'Registration failed. Please try again.';
        try {
          const errorData = await response.json();
          errorMessage = errorData.message || errorMessage;
          console.error('Backend error:', errorData);
        } catch (parseError) {
          console.error('Could not parse error response:', parseError);
          console.error('Response status:', response.status);
          console.error('Response text:', await response.text());
        }
        
        alert(errorMessage);
        document.getElementById('signupBtn').classList.remove('loading');
        playFlip(false);
      }
    } catch (error) {
      console.error('Registration error:', error);
      console.error('Error details:', error.message);
      console.error('Error stack:', error.stack);
      
      // More detailed error message
      let errorMessage = 'Registration failed. Please try again.';
      if (error.message.includes('fetch')) {
        errorMessage = 'Network error: Cannot connect to server. Please check your internet connection.';
      } else if (error.message.includes('CORS')) {
        errorMessage = 'CORS error: Server configuration issue. Please contact support.';
      }
      
      alert(errorMessage + '\n\nCheck browser console (F12) for more details.');
      document.getElementById('signupBtn').classList.remove('loading');
      playFlip(false);
    }
  });

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.4s ease';
  }
</script>

</body>
</html>
