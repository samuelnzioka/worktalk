<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign Up - AjiraTalk</title>
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://worktalk-backend2.onrender.com;">
    
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <!-- Lottie Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Split Layout Container */
        .register-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            position: relative;
        }

        /* Left Visual Panel */
        .visual-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .visual-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .brand-content {
            text-align: center;
            color: white;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        .brand-logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .brand-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Lottie Animation Container */
        .lottie-container {
            width: 300px;
            height: 300px;
            margin: 2rem auto;
            z-index: 1;
        }

        /* Right Register Panel */
        .register-panel {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* Register Card Animation */
        .register-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 
                0 20px 25px -5px rgba(0, 0, 0, 0.1),
                0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: translateX(100px);
            opacity: 0;
        }

        @keyframes slideInRight {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Register Header */
        .register-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .register-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            color: #6b7280;
            font-size: 1rem;
        }

        /* Form Styles */
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #ffffff;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .password-input-container {
            position: relative;
        }

        .show-password-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #6b7280;
        }

        .show-password-btn:hover {
            background: #f3f4f6;
            color: #374151;
        }

        .form-error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .form-error.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Button Styles */
        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-google {
            background: white;
            color: #374151;
            border: 2px solid #e5e7eb;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .btn-google:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-full {
            width: 100%;
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #374151;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Divider */
        .form-divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            gap: 1rem;
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .form-divider span {
            color: #6b7280;
            font-size: 0.875rem;
        }

        /* Footer */
        .register-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
        }

        .register-footer p {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .register-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .register-footer a:hover {
            color: #764ba2;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .register-container {
                grid-template-columns: 1fr;
            }

            .visual-panel {
                display: none;
            }

            .register-panel {
                padding: 1rem;
            }

            .register-card {
                padding: 2rem;
                animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                transform: translateY(50px);
            }

            @keyframes slideInUp {
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Left Visual Panel -->
        <div class="visual-panel">
            <div class="brand-content">
                <div class="brand-logo">🗣️</div>
                <h1 class="brand-title">AjiraTalk</h1>
                <p class="brand-subtitle">
                    Join our community of transparent workplaces. Share your authentic experiences and help others make informed career decisions.
                </p>
                <!-- Lottie Animation Container -->
                <div id="signupLottie" class="lottie-container"></div>
            </div>
        </div>

        <!-- Right Register Panel -->
        <div class="register-panel">
            <div class="register-card">
                <div class="register-header">
                    <h1>Create account</h1>
                    <p>Join our workplace transparency community</p>
                </div>

                <form id="registerForm" class="register-form">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            class="form-input" 
                            placeholder="John Doe"
                            required 
                            autocomplete="name"
                        >
                        <div class="form-error" id="fullNameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="you@example.com"
                            required 
                            autocomplete="email"
                        >
                        <div class="form-error" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="password-input-container">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input" 
                                placeholder="••••••••"
                                required 
                                autocomplete="new-password"
                            >
                            <button type="button" id="showPasswordBtn" class="show-password-btn">
                                <span id="eyeIcon">👁️</span>
                            </button>
                        </div>
                        <div class="form-error" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm password</label>
                        <div class="password-input-container">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                class="form-input" 
                                placeholder="••••••••"
                                required 
                                autocomplete="new-password"
                            >
                            <button type="button" id="showConfirmPasswordBtn" class="show-password-btn">
                                <span id="confirmEyeIcon">👁️</span>
                            </button>
                        </div>
                        <div class="form-error" id="confirmPasswordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                        <span id="btnText">Create Account</span>
                    </button>
                </form>

                <div class="form-divider">
                    <span>OR</span>
                </div>

                <button class="btn btn-google btn-full" id="googleRegisterBtn">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M17.64 9.20455C17.64 8.56637 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8196H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"/>
                        <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8196L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957273V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"/>
                        <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957273C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957273 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
                        <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957273 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
                    </svg>
                    Sign up with Google
                </button>

                <div class="register-footer">
                    <p>Already have an account? <a href="/login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { register } from '/js/auth.js';
        import { sanitizeInput, showToast } from '/js/utils.js';

        // Initialize Lottie Animation
        let signupAnimation;
        
        function initSignupAnimation() {
            const container = document.getElementById('signupLottie');
            
            // Load the Sign up Animation JSON
            fetch('/json/Sign up.json')
                .then(response => response.json())
                .then(animationData => {
                    signupAnimation = lottie.loadAnimation({
                        container: container,
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        animationData: animationData,
                        rendererSettings: {
                            progressiveLoad: true,
                            hideOnTransparent: true
                        }
                    });
                })
                .catch(error => {
                    console.error('Error loading signup animation:', error);
                    // Fallback: Show a simple animated icon if Lottie fails
                    container.innerHTML = '<div style="font-size: 120px; animation: bounce 2s infinite;">👋</div>';
                });
        }

        // Form elements
        const registerForm = document.getElementById('registerForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const showPasswordBtn = document.getElementById('showPasswordBtn');
        const showConfirmPasswordBtn = document.getElementById('showConfirmPasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        const confirmEyeIcon = document.getElementById('confirmEyeIcon');
        const registerBtn = document.getElementById('registerBtn');
        const btnText = document.getElementById('btnText');
        const googleRegisterBtn = document.getElementById('googleRegisterBtn');

        // Error elements
        const fullNameError = document.getElementById('fullNameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');

        // Password visibility toggles
        let isPasswordVisible = false;
        let isConfirmPasswordVisible = false;

        showPasswordBtn.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            
            if (isPasswordVisible) {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        });

        showConfirmPasswordBtn.addEventListener('click', () => {
            isConfirmPasswordVisible = !isConfirmPasswordVisible;
            
            if (isConfirmPasswordVisible) {
                confirmPasswordInput.type = 'text';
                confirmEyeIcon.textContent = '🙈';
            } else {
                confirmPasswordInput.type = 'password';
                confirmEyeIcon.textContent = '👁️';
            }
        });

        // Clear errors on input
        fullNameInput.addEventListener('input', () => {
            fullNameError.classList.remove('show');
            fullNameError.textContent = '';
        });

        emailInput.addEventListener('input', () => {
            emailError.classList.remove('show');
            emailError.textContent = '';
        });

        passwordInput.addEventListener('input', () => {
            passwordError.classList.remove('show');
            passwordError.textContent = '';
        });

        confirmPasswordInput.addEventListener('input', () => {
            confirmPasswordError.classList.remove('show');
            confirmPasswordError.textContent = '';
        });

        // Form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            fullNameError.classList.remove('show');
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            confirmPasswordError.classList.remove('show');
            
            // Get and sanitize inputs
            const fullName = sanitizeInput(fullNameInput.value.trim());
            const email = sanitizeInput(emailInput.value.trim());
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // Validation
            let hasError = false;
            
            if (!fullName) {
                fullNameError.textContent = 'Full name is required';
                fullNameError.classList.add('show');
                hasError = true;
            } else if (fullName.length < 2) {
                fullNameError.textContent = 'Full name must be at least 2 characters';
                fullNameError.classList.add('show');
                hasError = true;
            }
            
            if (!email) {
                emailError.textContent = 'Email is required';
                emailError.classList.add('show');
                hasError = true;
            } else if (!email.includes('@')) {
                emailError.textContent = 'Please enter a valid email';
                emailError.classList.add('show');
                hasError = true;
            }
            
            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordError.classList.add('show');
                hasError = true;
            } else if (password.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters';
                passwordError.classList.add('show');
                hasError = true;
            }
            
            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Please confirm your password';
                confirmPasswordError.classList.add('show');
                hasError = true;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Passwords do not match';
                confirmPasswordError.classList.add('show');
                hasError = true;
            }
            
            if (!agreeTerms) {
                showToast('Please agree to the Terms of Service and Privacy Policy', 'error');
                hasError = true;
            }
            
            if (hasError) return;
            
            // Show loading state
            registerBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span> Creating account...';
            
            try {
                const result = await register(fullName, email, password);
                
                if (result.success) {
                    showToast('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = result.redirectTo || '/dashboard.html';
                    }, 1000);
                } else {
                    if (result.field === 'email') {
                        emailError.textContent = result.message || 'Registration failed';
                        emailError.classList.add('show');
                    } else {
                        passwordError.textContent = result.message || 'Registration failed';
                        passwordError.classList.add('show');
                    }
                }
            } catch (error) {
                console.error('Registration error:', error);
                passwordError.textContent = 'An error occurred. Please try again.';
                passwordError.classList.add('show');
            } finally {
                registerBtn.disabled = false;
                btnText.textContent = 'Create Account';
            }
        });

        // Google registration (placeholder)
        googleRegisterBtn.addEventListener('click', () => {
            showToast('Google registration coming soon!', 'info');
        });

        // Initialize animation when page loads
        document.addEventListener('DOMContentLoaded', initSignupAnimation);
    </script>
</body>
</html>
