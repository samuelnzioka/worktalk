<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AjiraTalk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo span {
            color: #1a1a2e;
            background: none;
        }
        
        .nav {
            display: flex;
            gap: 32px;
        }
        
        .nav-link {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: #667eea;
        }
        
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 40px 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .auth-header p {
            color: #718096;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3748;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .form-error {
            color: #e53e3e;
            font-size: 12px;
            margin-top: 6px;
        }
        
        .form-success {
            color: #38a169;
            font-size: 12px;
            margin-top: 6px;
        }
        
        .form-hint {
            color: #718096;
            font-size: 12px;
            margin-top: 6px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .footer {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: #718096;
        }
        
        @media (max-width: 640px) {
            .auth-card { padding: 24px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">Ajira<span>Talk</span></a>
            <nav class="nav">
                <a href="/companies.html" class="nav-link">Companies</a>
                <a href="/public-timeline.html" class="nav-link">Public Timeline</a>
            </nav>
            <div class="user-menu">
                <a href="/login.html" class="btn btn-outline">Log In</a>
                <a href="/register.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter the reset code and your new password</p>
            </div>

            <div id="resetCodeSection">
                <form id="resetCodeForm">
                    <div class="form-group">
                        <label class="form-label">Reset Code</label>
                        <input type="text" id="resetCode" class="form-input" placeholder="Enter the code from your email" required>
                        <div class="form-hint">Check your email for the 6-digit reset code</div>
                        <div class="form-error" id="codeError"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="verifyCodeBtn">Verify Code</button>
                </form>
            </div>

            <div id="newPasswordSection" style="display: none;">
                <form id="newPasswordForm">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required>
                        <div class="form-hint">At least 8 characters with at least one letter and one number</div>
                        <div class="form-error" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                        <div class="form-error" id="confirmError"></div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="resetBtn">Reset Password</button>
                </form>
            </div>

            <div class="back-link">
                <a href="/login.html">← Back to Login</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 AjiraTalk. All rights reserved.</p>
    </footer>

    <script>
        // API URL
        const API_BASE_URL = 'https://worktalk-backend2.onrender.com/api';
        
        // Get token from URL (if present)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        let resetToken = token; // Use URL token if present, otherwise from code
        
        // Elements
        const resetCodeSection = document.getElementById('resetCodeSection');
        const newPasswordSection = document.getElementById('newPasswordSection');
        const resetCodeForm = document.getElementById('resetCodeForm');
        const newPasswordForm = document.getElementById('newPasswordForm');
        const resetCodeInput = document.getElementById('resetCode');
        const codeError = document.getElementById('codeError');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');
        const verifyCodeBtn = document.getElementById('verifyCodeBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // If token is in URL, skip code entry
        if (token) {
            resetToken = token;
            resetCodeSection.style.display = 'none';
            newPasswordSection.style.display = 'block';
        }
        
        // Verify code from email
        resetCodeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            codeError.textContent = '';
            
            const code = resetCodeInput.value.trim();
            
            if (!code || code.length < 6) {
                codeError.textContent = 'Please enter a valid reset code';
                return;
            }
            
            verifyCodeBtn.disabled = true;
            verifyCodeBtn.textContent = 'Verifying...';
            
            try {
                // In a real implementation, you would verify the code with the backend
                // For now, we'll assume the code is valid if it's not empty
                // The actual verification happens when resetting password
                
                resetToken = code;
                resetCodeSection.style.display = 'none';
                newPasswordSection.style.display = 'block';
                
            } catch (error) {
                console.error('Verification error:', error);
                codeError.textContent = 'Invalid or expired reset code. Please request a new one.';
            } finally {
                verifyCodeBtn.disabled = false;
                verifyCodeBtn.textContent = 'Verify Code';
            }
        });
        
        // Reset password
        newPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            passwordError.textContent = '';
            confirmError.textContent = '';
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Validate password
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;
            if (!newPassword || !passwordRegex.test(newPassword)) {
                passwordError.textContent = 'Password must be at least 8 characters with at least one letter and one number';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                confirmError.textContent = 'Passwords do not match';
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting Password...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    alert('Password reset successfully! You can now log in with your new password.');
                    window.location.href = '/login.html';
                } else {
                    passwordError.textContent = data.message || 'Failed to reset password. Please try again.';
                }
            } catch (error) {
                console.error('Reset password error:', error);
                passwordError.textContent = 'An error occurred. Please try again.';
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
